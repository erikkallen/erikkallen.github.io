<header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
    <a href="{{ site.baseurl }}/" class="flex items-center gap-3 text-gray-900 hover:text-blue-600 transition-colors" style="text-decoration:none">
      <img src="/images/erikkallen_logo4.png" class="w-10 h-10 rounded-full object-cover" alt="{{ site.title }}">
      <span class="font-bold text-lg tracking-tight">{{ site.title }}</span>
    </a>

    <nav class="hidden sm:flex items-center gap-6 text-sm font-medium text-gray-600">
      <a href="{{ '/' | prepend: site.baseurl }}" class="hover:text-blue-600 transition-colors">Blog</a>
      {% for p in site.pages %}
        {% if p.title and p.title != "CLAUDE.md" %}
          <a href="{{ p.url | prepend: site.baseurl }}" class="hover:text-blue-600 transition-colors">{{ p.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>

    <button id="menu-btn" aria-label="Toggle menu" class="sm:hidden p-2 rounded-md text-gray-500 hover:bg-gray-100 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <div id="mobile-menu" class="hidden sm:hidden border-t border-gray-100 bg-white px-4 py-3 flex flex-col gap-3 text-sm font-medium text-gray-700">
    <a href="{{ '/' | prepend: site.baseurl }}" class="hover:text-blue-600 transition-colors">Blog</a>
    {% for p in site.pages %}
      {% if p.title and p.title != "CLAUDE.md" %}
        <a href="{{ p.url | prepend: site.baseurl }}" class="hover:text-blue-600 transition-colors">{{ p.title }}</a>
      {% endif %}
    {% endfor %}
  </div>
</header>
