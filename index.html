---
layout: default
---

<section>
  <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-8">Blog</h1>

  <ul class="space-y-4">
    {% for post in site.posts %}
    <li class="bg-white rounded-xl border border-gray-200 hover:shadow-md transition-shadow">
      <a href="{{ post.url | prepend: site.baseurl }}" class="block p-6 group" style="text-decoration:none">
        <div class="flex items-start justify-between gap-4">
          <h2 class="text-lg font-semibold text-gray-900 group-hover:text-blue-600 transition-colors">{{ post.title }}</h2>
          <time class="text-sm text-gray-400 shrink-0 pt-0.5">{{ post.date | date: "%b %-d, %Y" }}</time>
        </div>
        {% if post.excerpt %}
        <p class="mt-2 text-gray-500 text-sm leading-relaxed">{{ post.excerpt | strip_html | truncate: 200 }}</p>
        {% endif %}
      </a>
    </li>
    {% endfor %}
  </ul>

  <p class="mt-10 text-sm text-gray-400">
    Subscribe <a href="{{ '/feed.xml' | prepend: site.baseurl }}" class="text-blue-600 hover:underline">via RSS</a>
  </p>
</section>
