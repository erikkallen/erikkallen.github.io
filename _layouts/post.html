---
layout: default
---

<article>
  <header class="mb-8">
    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-gray-900 mb-2">{{ page.title }}</h1>
    <p class="text-gray-500 text-sm">
      {{ page.date | date: "%b %-d, %Y" }}
      {% if page.author %} &middot; {{ page.author }}{% endif %}
      {% if page.categories.size > 0 %}
        &middot;
        {% for cat in page.categories %}<span class="inline-block bg-blue-50 text-blue-700 text-xs font-medium px-2 py-0.5 rounded-full mr-1">{{ cat }}</span>{% endfor %}
      {% endif %}
    </p>
  </header>
  <div class="prose prose-blue max-w-none">
    {{ content }}
  </div>
</article>
